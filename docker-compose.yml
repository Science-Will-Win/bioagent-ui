# ============================================================
# AIGEN BioAgent — Docker Compose
# A안(기본): FE + BE 단일 네트워크, 개별 컨테이너
# B안(backup): 완전 분리 — 주석 해제하여 사용
# 확정 근거: A8 (Docker A안 기본, B안 backup)
# ============================================================

version: "3.9"

services:
  # ── FE: Web UI (Nginx) ──
  bioagent-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bioagent-ui
    ports:
      - "${UI_PORT:-3000}:80"
    volumes:
      # BE 프록시 필요 시 template으로 교체
      # - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - BACKEND_HOST=bioagent-api
      - BACKEND_PORT=8000
    depends_on:
      bioagent-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bioagent-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ── BE: FastAPI + Agent Runner ──
  # ※ 이지연님 FastAPI 서버 완성 후 image/build 경로 확정
  bioagent-api:
    image: bioagent-api:latest
    # build:
    #   context: ../bioagent-api
    #   dockerfile: Dockerfile
    container_name: bioagent-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse:3100}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - VLLM_HOST=${VLLM_HOST:-http://host.docker.internal:8080}
      - GPU_DEVICES=6,7
    # GPU 할당 (DGX A100 서버, GPU 6-7번만 사용 — 규칙 #5)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["6", "7"]
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - bioagent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  bioagent-net:
    driver: bridge

# ============================================================
